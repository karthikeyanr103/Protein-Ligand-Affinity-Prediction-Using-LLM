name: Deploy Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "space/**"
      - "src/affinity/**"
      - ".github/workflows/deploy-huggingface.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install "huggingface-hub>=0.24"
      - name: Stage Docker Space
        run: |
          mkdir -p .space-build/affinity
          cp -R space/. .space-build/
          cp -R src/affinity/. .space-build/affinity/
      - name: Upload Space
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = os.environ["HF_SPACE_ID"]
          api.create_repo(repo_id, repo_type="space", space_sdk="docker", exist_ok=True)
          api.upload_folder(
              repo_id=repo_id,
              repo_type="space",
              folder_path=".space-build",
              commit_message="Deploy from GitHub Actions",
          )
          PY
