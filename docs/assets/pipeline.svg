<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="290" viewBox="0 0 1200 290" role="img" aria-labelledby="title description">
  <title id="title">Protein-compound affinity prediction pipeline</title>
  <desc id="description">Animated flow from protein sequence and molecule SMILES through ONNX encoders to an affinity prediction.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="score" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#1e293b" flood-opacity=".13"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <style>
      .box { fill:#fff; stroke:#cbd5e1; stroke-width:2; filter:url(#shadow); }
      .label { font:600 18px Arial, sans-serif; fill:#0f172a; text-anchor:middle; }
      .small { font:14px Arial, sans-serif; fill:#64748b; text-anchor:middle; }
      .line { fill:none; stroke:#64748b; stroke-width:3; marker-end:url(#arrow); stroke-dasharray:10 8; animation:flow 1.4s linear infinite; }
      .pulse { animation:pulse 2.4s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
      @keyframes flow { to { stroke-dashoffset:-36; } }
      @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.025); } }
    </style>
  </defs>
  <rect width="1200" height="290" rx="24" fill="url(#background)"/>

  <rect class="box" x="35" y="38" width="205" height="82" rx="16"/>
  <text class="label" x="138" y="72">Protein sequence</text>
  <text class="small" x="138" y="98">Amino-acid tokens</text>

  <rect class="box" x="35" y="170" width="205" height="82" rx="16"/>
  <text class="label" x="138" y="204">Compound SMILES</text>
  <text class="small" x="138" y="230">Molecular tokens</text>

  <path class="line" d="M240 79 H330"/>
  <path class="line" d="M240 211 H330"/>

  <g class="pulse">
    <rect class="box" x="330" y="38" width="215" height="82" rx="16"/>
    <text class="label" x="438" y="72">ESM-2 ONNX</text>
    <text class="small" x="438" y="98">Protein embedding</text>
  </g>
  <g class="pulse" style="animation-delay:.6s">
    <rect class="box" x="330" y="170" width="215" height="82" rx="16"/>
    <text class="label" x="438" y="204">MoLFormer ONNX</text>
    <text class="small" x="438" y="230">Molecule embedding</text>
  </g>

  <path class="line" d="M545 79 C625 79 620 132 690 140"/>
  <path class="line" d="M545 211 C625 211 620 158 690 150"/>

  <rect class="box" x="690" y="103" width="205" height="88" rx="16"/>
  <text class="label" x="793" y="139">Fusion + scaling</text>
  <text class="small" x="793" y="165">Concatenated features</text>

  <path class="line" d="M895 147 H965"/>

  <g class="pulse" style="animation-delay:1.1s">
    <rect x="965" y="91" width="205" height="112" rx="18" fill="url(#score)" filter="url(#shadow)"/>
    <text x="1068" y="132" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#fff" text-anchor="middle">Affinity ONNX</text>
    <text x="1068" y="169" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#fff" text-anchor="middle">Prediction</text>
  </g>
</svg>
