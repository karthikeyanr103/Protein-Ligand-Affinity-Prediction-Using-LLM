[data]
path = "data/sample_train.csv"
split_strategy = "cold_protein"
train_fraction = 0.80
validation_fraction = 0.10
seed = 42

[features]
protein_embedding_path = ""
molecule_embedding_path = ""

[model]
hidden_dims = [256, 128, 64]
dropout = 0.20

[training]
batch_size = 128
epochs = 30
learning_rate = 0.001
weight_decay = 0.0001
patience = 5
num_workers = 0

[output]
directory = "artifacts/baseline"

